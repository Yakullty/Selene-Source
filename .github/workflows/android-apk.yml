name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Android SDK licenses and install NDK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "$SDKMANAGER" --install "cmdline-tools;latest"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" --install "ndk;29.0.14033849"
          yes | "$SDKMANAGER" --licenses
          ls -la "$ANDROID_HOME/ndk"

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_path="android/app/release-key.jks"

          # Strip whitespace/newlines (common when pasting base64 into GitHub Secrets).
          clean_base64="$(printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]')"
          printf '%s' "$clean_base64" | base64 --decode > "$keystore_path"

          if [ ! -s "$keystore_path" ]; then
            echo "::error::Decoded keystore is empty. Re-encode the binary keystore file, not its path or text content."
            exit 1
          fi

          decoded_size="$(wc -c < "$keystore_path" | tr -d ' ')"
          base64_length="${#clean_base64}"
          file_head="$(head -c 4 "$keystore_path" | od -An -tx1 | tr -d ' \n')"
          echo "Decoded keystore size: ${decoded_size} bytes"
          echo "Base64 secret length: ${base64_length} chars"
          echo "File header (hex): ${file_head}"

          case "$file_head" in
            feedfeed*) echo "Header looks like JKS." ;;
            3082*|3080*) echo "Header looks like PKCS12." ;;
            *)
              echo "::warning::Unexpected file header. Secret may contain text/path, certutil output, or corrupted base64."
              echo "First 32 bytes:"
              head -c 32 "$keystore_path" | od -An -tx1
              ;;
          esac

          store_type=""
          jks_error=""
          p12_error=""
          if keytool -list -keystore "$keystore_path" -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            store_type="JKS"
          fi

          if [ -z "$store_type" ]; then
            if keytool -list -keystore "$keystore_path" -storetype PKCS12 -storepass "$ANDROID_KEYSTORE_PASSWORD" >/dev/null 2>&1; then
              store_type="PKCS12"
            else
              p12_error="$(keytool -list -keystore "$keystore_path" -storetype PKCS12 -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1 || true)"
            fi
          fi

          if [ -z "$store_type" ]; then
            jks_error="$(keytool -list -keystore "$keystore_path" -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>&1 || true)"
            echo "::error::Keystore could not be read."
            echo "JKS attempt: $jks_error"
            echo "PKCS12 attempt: $p12_error"
            if echo "$jks_error$p12_error" | grep -qi "password was incorrect"; then
              echo "::error::ANDROID_KEYSTORE_PASSWORD appears to be wrong."
            else
              echo "::error::ANDROID_KEYSTORE_BASE64 is invalid. Re-encode the original .jks/.p12 file."
              echo "Windows: pwsh ./scripts/encode-android-keystore.ps1 -KeystorePath 'path\\selene-release-key.jks' -StorePassword 'your-password'"
              echo "Linux/macOS: base64 -w 0 selene-release-key.jks"
              echo "Do NOT use certutil -encode (it adds BEGIN/END headers)."
            fi
            exit 1
          fi

          if ! keytool -list -keystore "$keystore_path" -storetype "$store_type" -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" > /dev/null 2>&1; then
            echo "::error::Key alias '$ANDROID_KEY_ALIAS' was not found in the keystore."
            keytool -list -keystore "$keystore_path" -storetype "$store_type" -storepass "$ANDROID_KEYSTORE_PASSWORD" || true
            exit 1
          fi

          {
            echo "storeFile=release-key.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "storeType=$store_type"
          } > android/key.properties

      - name: Build release APKs
        run: |
          flutter build apk --release \
            --target-platform android-arm64,android-arm \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Collect APKs
        shell: bash
        run: |
          version="$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/selene-${version}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/selene-${version}-armeabi-v7a.apk"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selene-android-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@v4
        with:
          name: selene-android-symbols
          path: build/app/outputs/symbols
          if-no-files-found: warn
